name: Fetch Talordata

on:
  schedule:
    - cron: "0 10 * * 1-6"  # 10:00 UTC = 07:00 Brasília, seg–sáb
    - cron: "0 19 * * 1-6"  # 19:00 UTC = 16:00 Brasília, seg–sáb
  workflow_dispatch:

jobs:
  fetch:
    name: Buscas Talordata (tracked_searches)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar preços e salvar no Supabase
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          TALORDATA_TOKEN: ${{ secrets.TALORDATA_TOKEN }}
        run: python fetch.py --api talordata
