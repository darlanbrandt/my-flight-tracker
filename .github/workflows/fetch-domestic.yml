name: Fetch Domestic Prices

on:
  schedule:
    - cron: "0 10 * * 1-6"  # 10:00 UTC = 07:00 Brasília, seg–sáb (250 req/mês)
  workflow_dispatch:
    inputs:
      date_out:
        description: "Data de saída de FLN (YYYY-MM-DD)"
        required: false
        default: ""
      date_back:
        description: "Data de volta para FLN (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  fetch:
    name: Buscar tarifas domésticas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar preços e salvar no Supabase
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY_DOMESTIC: ${{ secrets.SERPAPI_KEY_DOMESTIC }}
          # Input manual tem prioridade; cai para a var do repositório se vazio
          DOMESTIC_DATE_OUT:   ${{ inputs.date_out  || vars.DOMESTIC_DATE_OUT }}
          DOMESTIC_DATE_BACK:  ${{ inputs.date_back || vars.DOMESTIC_DATE_BACK }}
        run: python fetch_domestic.py
