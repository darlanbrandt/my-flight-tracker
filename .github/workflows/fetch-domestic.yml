name: Fetch Domestic Prices

on:
  schedule:
    - cron: "0 10 * * *"    # 10:00 UTC = 07:00 Brasília
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

jobs:
  fetch:
    name: Buscar tarifas domésticas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar preços e salvar no Supabase
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          DOMESTIC_DATE_OUT:   ${{ vars.DOMESTIC_DATE_OUT }}
          DOMESTIC_DATE_BACK:  ${{ vars.DOMESTIC_DATE_BACK }}
        run: python fetch_domestic.py
