name: Fetch Flight Prices

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC = 06:00 Brasília
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  fetch:
    name: Buscar e salvar preços
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar preços e salvar no Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_prices.py
